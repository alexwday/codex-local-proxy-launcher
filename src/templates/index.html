<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kilo-Launcher</title>
    <style>
        :root {
            --bg: #f6f7f9;
            --surface: #ffffff;
            --surface-alt: #f1f3f5;
            --border: #dfe3e8;
            --text: #111827;
            --muted: #6b7280;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --success: #047857;
            --success-light: #ecfdf5;
            --error: #b91c1c;
            --error-light: #fef2f2;
            --warning: #b45309;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.5;
        }

        .page {
            width: min(1180px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 24px 0 40px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mark {
            width: 36px;
            height: 36px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            font-size: 13px;
        }

        h1 {
            margin: 0;
            font-size: 18px;
            line-height: 1.2;
        }

        .subtitle {
            margin-top: 2px;
            color: var(--muted);
            font-size: 12px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            background: var(--success-light);
            color: var(--success);
            font-size: 12px;
            font-weight: 600;
        }

        .status::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: var(--success);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 14px;
        }

        @media (max-width: 980px) {
            .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 680px) {
            .page { width: min(100vw - 20px, 1180px); padding-top: 16px; }
            header { align-items: flex-start; flex-direction: column; }
            .grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 13px 14px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-size: 13px;
            font-weight: 700;
        }

        .panel-body {
            padding: 14px;
        }

        .rows {
            display: grid;
            gap: 9px;
        }

        .row {
            display: grid;
            grid-template-columns: 112px minmax(0, 1fr);
            gap: 10px;
            align-items: center;
            min-height: 26px;
        }

        .label {
            color: var(--muted);
            font-size: 12px;
        }

        .value {
            overflow: hidden;
            min-width: 0;
            padding: 4px 7px;
            border-radius: 6px;
            background: var(--surface-alt);
            color: var(--text);
            font-family: var(--mono);
            font-size: 11px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .model-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .pill {
            max-width: 100%;
            overflow: hidden;
            padding: 4px 8px;
            border-radius: 999px;
            background: var(--accent-light);
            color: var(--accent);
            font-family: var(--mono);
            font-size: 11px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .stat {
            padding: 10px;
            border-radius: 7px;
            background: var(--surface-alt);
        }

        .stat-label {
            margin-bottom: 2px;
            color: var(--muted);
            font-size: 11px;
        }

        .stat-value {
            font-size: 17px;
            font-weight: 700;
        }

        .span-2 { grid-column: span 2; }

        pre {
            margin: 0;
            max-height: 300px;
            overflow: auto;
            padding: 12px;
            border-radius: 8px;
            background: #111827;
            color: #e5e7eb;
            font-family: var(--mono);
            font-size: 11px;
            line-height: 1.55;
            white-space: pre;
        }

        .wide {
            margin-bottom: 14px;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            border: 1px solid var(--border);
            border-radius: 7px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font: inherit;
            font-size: 12px;
            font-weight: 600;
            padding: 7px 10px;
        }

        button:hover { background: var(--surface-alt); }

        button.primary {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff;
        }

        button.primary:hover { background: #1d4ed8; }

        .logs {
            max-height: 430px;
            overflow: auto;
        }

        .log-entry {
            display: grid;
            grid-template-columns: 76px 54px minmax(0, 1fr) 62px 76px;
            gap: 10px;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .log-entry:last-child { border-bottom: 0; }

        .log-time,
        .method,
        .path,
        .duration {
            font-family: var(--mono);
        }

        .log-time,
        .duration {
            color: var(--muted);
            font-size: 11px;
        }

        .method {
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
        }

        .path {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .code {
            justify-self: start;
            padding: 2px 6px;
            border-radius: 999px;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
        }

        .code.ok {
            background: var(--success-light);
            color: var(--success);
        }

        .code.err {
            background: var(--error-light);
            color: var(--error);
        }

        .empty {
            padding: 32px 14px;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
        }

        @media (max-width: 760px) {
            .log-entry {
                grid-template-columns: 64px 44px minmax(0, 1fr) 54px;
            }
            .duration { display: none; }
        }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <div class="brand">
                <div class="mark">KL</div>
                <div>
                    <h1>Kilo-Launcher</h1>
                    <div class="subtitle">OpenAI-compatible local proxy</div>
                </div>
            </div>
            <div class="actions">
                <button onclick="refreshAll()">Refresh</button>
                <button class="primary" onclick="copyConfig()">Copy kilo.jsonc</button>
                <span class="status">Active</span>
            </div>
        </header>

        <section class="grid">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">Kilo Settings</div>
                </div>
                <div class="panel-body rows">
                    <div class="row">
                        <div class="label">Provider</div>
                        <div class="value">OpenAI Compatible</div>
                    </div>
                    <div class="row">
                        <div class="label">Base URL</div>
                        <div class="value" id="baseUrl">-</div>
                    </div>
                    <div class="row">
                        <div class="label">API Key</div>
                        <div class="value" id="apiKey">-</div>
                    </div>
                    <div class="row">
                        <div class="label">Models URL</div>
                        <div class="value" id="modelsUrl">-</div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">Target</div>
                </div>
                <div class="panel-body rows">
                    <div class="row">
                        <div class="label">Endpoint</div>
                        <div class="value" id="targetEndpoint">-</div>
                    </div>
                    <div class="row">
                        <div class="label">Mode</div>
                        <div class="value" id="proxyMode">-</div>
                    </div>
                    <div class="row">
                        <div class="label">Auth</div>
                        <div class="value" id="authType">-</div>
                    </div>
                    <div class="row">
                        <div class="label">SSL</div>
                        <div class="value" id="sslState">-</div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">Usage</div>
                </div>
                <div class="panel-body stats">
                    <div class="stat">
                        <div class="stat-label">Requests</div>
                        <div class="stat-value" id="totalRequests">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Success</div>
                        <div class="stat-value" id="successRate">100%</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Input Tokens</div>
                        <div class="stat-value" id="inputTokens">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Output Tokens</div>
                        <div class="stat-value" id="outputTokens">0</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="panel wide">
            <div class="panel-header">
                <div class="panel-title">Models</div>
            </div>
            <div class="panel-body">
                <div class="model-list" id="modelList"></div>
            </div>
        </section>

        <section class="panel wide">
            <div class="panel-header">
                <div class="panel-title">kilo.jsonc</div>
            </div>
            <div class="panel-body">
                <pre id="kiloConfig">{}</pre>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">
                <div class="panel-title">Recent Calls</div>
                <button onclick="clearLogs()">Clear</button>
            </div>
            <div class="logs" id="logs"></div>
        </section>
    </div>

    <script>
        let lastConfig = {};

        function text(id, value) {
            document.getElementById(id).textContent = value ?? "-";
        }

        function fmtNumber(value) {
            return Number(value || 0).toLocaleString();
        }

        function fmtTime(timestamp) {
            return new Date(timestamp * 1000).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit"
            });
        }

        async function fetchJson(url, options = {}) {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`${url} returned ${response.status}`);
            return response.json();
        }

        async function loadConfig() {
            const config = await fetchJson("/api/config");
            lastConfig = config;
            text("baseUrl", config.openaiBaseUrl);
            text("apiKey", config.accessTokenPreview);
            text("modelsUrl", config.models_url || config.modelsUrl);
            text("targetEndpoint", config.target_endpoint);
            text("proxyMode", config.use_placeholder_mode ? "placeholder" : "proxy");

            const auth = config.oauth_configured
                ? "oauth"
                : (config.api_key_configured ? "api key" : (config.dev_mode ? "dev" : "none"));
            text("authType", auth);
            text("sslState", config.ssl_enabled ? "enabled" : "disabled");

            const modelList = document.getElementById("modelList");
            modelList.innerHTML = "";
            (config.model_options || []).forEach((model) => {
                const pill = document.createElement("span");
                const mapped = config.model_mapping && config.model_mapping[model]
                    ? `${model} -> ${config.model_mapping[model]}`
                    : model;
                pill.className = "pill";
                pill.textContent = mapped;
                modelList.appendChild(pill);
            });
            if (!modelList.children.length) {
                modelList.innerHTML = '<div class="empty">No models configured</div>';
            }

            text("kiloConfig", config.kiloConfigJson || "{}");
        }

        async function loadUsage() {
            const usage = await fetchJson("/api/usage");
            text("totalRequests", fmtNumber(usage.total_requests));
            text("successRate", `${usage.success_rate}%`);
            text("inputTokens", fmtNumber(usage.total_input_tokens));
            text("outputTokens", fmtNumber(usage.total_output_tokens));
        }

        async function loadLogs() {
            const data = await fetchJson("/api/logs?limit=80");
            const logs = document.getElementById("logs");
            const calls = data.apiCalls || [];
            if (!calls.length) {
                logs.innerHTML = '<div class="empty">No API calls yet</div>';
                return;
            }
            logs.innerHTML = calls.map((entry) => {
                const ok = entry.status < 400;
                return `
                    <div class="log-entry">
                        <div class="log-time">${fmtTime(entry.timestamp)}</div>
                        <div class="method">${entry.method}</div>
                        <div class="path" title="${entry.path}">${entry.path}</div>
                        <div class="code ${ok ? "ok" : "err"}">${entry.status}</div>
                        <div class="duration">${entry.duration_ms}ms</div>
                    </div>
                `;
            }).join("");
        }

        async function refreshAll() {
            try {
                await Promise.all([loadConfig(), loadUsage(), loadLogs()]);
            } catch (error) {
                console.error(error);
            }
        }

        async function clearLogs() {
            await fetchJson("/api/logs", { method: "DELETE" });
            await loadLogs();
        }

        async function copyConfig() {
            const value = lastConfig.kiloConfigJson || document.getElementById("kiloConfig").textContent;
            await navigator.clipboard.writeText(value);
        }

        refreshAll();
        setInterval(refreshAll, 5000);
    </script>
</body>
</html>
